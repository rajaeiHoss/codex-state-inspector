name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build and publish release
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build
        run: mvn -B test package

      - name: Prepare artifact
        run: |
          mkdir -p dist
          cp inspector-cli/target/inspector-cli-0.1.0-SNAPSHOT.jar dist/codex-state-inspector-${GITHUB_REF_NAME}.jar
          shasum -a 256 dist/codex-state-inspector-${GITHUB_REF_NAME}.jar > dist/codex-state-inspector-${GITHUB_REF_NAME}.jar.sha256

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/codex-state-inspector-${{ github.ref_name }}.jar
            dist/codex-state-inspector-${{ github.ref_name }}.jar.sha256
          generate_release_notes: true
