name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  build:
    name: Build and test
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build
        run: mvn -B test package

      - name: Smoke test CLI
        run: java -jar inspector-cli/target/inspector-cli-0.1.0-SNAPSHOT.jar --help

      - name: Upload runnable CLI artifact
        uses: actions/upload-artifact@v4
        with:
          name: codex-state-inspector-cli
          path: inspector-cli/target/inspector-cli-0.1.0-SNAPSHOT.jar
